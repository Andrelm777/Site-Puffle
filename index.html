const initTheme = () => {
  const html = document.documentElement;
  const saved = localStorage.getItem('theme');
  
  if (saved === 'dark') {
    html.classList.add('dark-mode');
    html.classList.remove('light-mode');
  } else if (saved === 'light') {
    html.classList.add('light-mode');
    html.classList.remove('dark-mode');
  } else {
    // Use system preference
    if (window.matchMedia('(prefers-color-scheme:dark)').matches) {
      html.classList.add('dark-mode');
    } else {
      html.classList.add('light-mode');
    }
  }
};

initTheme();

document.getElementById('theme-toggle').addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.classList.toggle('dark-mode');
  html.classList.toggle('light-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

// ── Build slides ────────────────────────────────────
const stage = document.getElementById('stage');
const dotsEl = document.getElementById('dots');
const counter = document.getElementById('counter');

PUFFLES.forEach((p, i) => {
  const slide = document.createElement('div');
  const puffleName = p.name.toLowerCase().replace(/\s+/g, '-');
  slide.className = 'slide puffle-' + puffleName + (i === 0 ? ' current' : '');
  slide.style.cssText = `--c:${p.color};--shadow:${p.shadow}`;
  slide.setAttribute('role', 'article');
  slide.setAttribute('aria-label', `${p.name} - Puffle ${String(i + 1).padStart(2, '0')} de ${PUFFLES.length}`);
  slide.setAttribute('aria-hidden', i === 0 ? 'false' : 'true');

  const statRows = Object.entries(p.stats).map(([k, v]) => `
    <div class="stat-row">
      <span class="stat-key">${k}</span>
      <div class="stat-track">
        <div class="stat-fill" style="--v:${v}"></div>
      </div>
      <span class="stat-val">${Math.round(v * 100)}</span>
    </div>`).join('');

  slide.innerHTML = `
    <!-- LEFT -->
    <div class="panel-left">
      <div class="bg-num">${p.id}</div>

      <p class="p-eyebrow">Espécie ${p.id} de ${PUFFLES.length}</p>

      <h2 class="p-name">
        Puffle<br><span>${p.name.replace(' ', '<br>')}</span>
      </h2>

      <p class="p-desc">${p.desc}</p>

      <div class="p-tags">
        ${p.tags.map(t => `<span class="p-tag">${t}</span>`).join('')}
      </div>

      <div class="p-divider"></div>
      <p class="p-fact">${p.fact}</p>

      <div class="p-stats">${statRows}</div>

      <div class="bottom-tag">
        <span class="price-chip">Pet Shop &nbsp;·&nbsp; <strong>400 moedas</strong></span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="panel-right">
      <div class="color-wash"></div>
      <div class="puffle-box">
        <img
          class="puffle-img"
          src="${p.img}"
          loading="${i === 0 ? 'eager' : 'lazy'}"
          alt="Puffle ${p.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
        >
        <div class="puffle-fallback"></div>
      </div>
    </div>
  `;

  stage.appendChild(slide);

  // Dot
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.style.setProperty('--dc', p.color);
  dot.setAttribute('role', 'tab');
  dot.setAttribute('aria-label', `Puffle ${String(i + 1).padStart(2, '0')}: ${p.name}`);
  dot.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

function triggerStats(slide) {
  slide.querySelectorAll('.stat-fill').forEach(el => {
    el.classList.remove('go');
    el.classList.add('go');
  });
}

triggerStats(document.querySelector('.slide.current'));

// ── Navigation ──────────────────────────────────────
let cur = 0;

function goTo(next) {
  if (next === cur) return;
  
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  const stage = document.getElementById('stage');

  slides[cur].classList.remove('current');
  slides[next].classList.add('current');
  slides[cur].setAttribute('aria-hidden', 'true');
  slides[next].setAttribute('aria-hidden', 'false');

  dots[cur].classList.remove('active');
  dots[next].classList.add('active');
  dots[cur].setAttribute('aria-selected', 'false');
  dots[next].setAttribute('aria-selected', 'true');
  dots[next].style.setProperty('--dc', PUFFLES[next].color);

  // Atualizar cor dinâmica de fundo
  stage.style.setProperty('--c', PUFFLES[next].color);
  stage.style.setProperty('--shadow', PUFFLES[next].shadow);

  counter.textContent = String(next + 1).padStart(2, '0') + ' / ' + PUFFLES.length;
  
  triggerStats(slides[next]);
  cur = next;
  
  // Preload inteligente das imagens adjacentes
  preloadAdjacentPuffles(next);
}

// Preload inteligente - carrega as imagens do próximo e anterior puffle
function preloadAdjacentPuffles(currentIndex) {
  const nextIdx = (currentIndex + 1) % PUFFLES.length;
  const prevIdx = (currentIndex - 1 + PUFFLES.length) % PUFFLES.length;
  
  // Preload next
  const nextImg = new Image();
  nextImg.src = PUFFLES[nextIdx].img;
  
  // Preload previous
  const prevImg = new Image();
  prevImg.src = PUFFLES[prevIdx].img;
}

// Preload inicial para o primeiro puffle
preloadAdjacentPuffles(0);

document.getElementById('next-btn').onclick = () => goTo((cur + 1) % PUFFLES.length);
document.getElementById('prev-btn').onclick = () => goTo((cur - 1 + PUFFLES.length) % PUFFLES.length);

// ── Keyboard Navigation ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    goTo((cur + 1) % PUFFLES.length);
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goTo((cur - 1 + PUFFLES.length) % PUFFLES.length);
  }
  // Home/End keys
  if (e.key === 'Home') {
    e.preventDefault();
    goTo(0);
  }
  if (e.key === 'End') {
    e.preventDefault();
    goTo(PUFFLES.length - 1);
  }
});

// ── Touch/Swipe Navigation ──
let tx = null;
let touchStartTime = null;
document.addEventListener('touchstart', e => { 
  tx = e.touches[0].clientX;
  touchStartTime = Date.now();
}, { passive: true });

document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dt = Date.now() - touchStartTime;
  const velocity = Math.abs(dx) / dt;
  
  // Swipe detected: > 50px distance OR > 0.5px/ms velocity
  if (Math.abs(dx) > 50 || velocity > 0.5) {
    if (dx < 0) goTo((cur + 1) % PUFFLES.length);
    else goTo((cur - 1 + PUFFLES.length) % PUFFLES.length);
  }
  tx = null;
  touchStartTime = null;
}, { passive: true });

// ── Dots Navigation with Enter Key ──
document.querySelectorAll('.dot').forEach((dot, i) => {
  dot.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      goTo(i);
    }
  });
});
